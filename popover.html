<!DOCTYPE HTML>

<html>
  <head>
  Popover
  
  </head>  
	  <body>
			<div popover id="demo"> 
			id in css is represented by #(hash)
			</div>
			the first two are by default they work on same button for both show and hide
			<button type="button" popovertarget="demo">Click me</button> 
			or 
			<button type="button" popovertarget="demo" popovertargetaction="toggle">Click me</button>
			This two work on seprate buttons show will only show the box or the text and hide will only hide 
			<button type="button" popovertarget="demo" popovertargetaction="show">Show</button>
			<button type="button" popovertarget="demo" popovertargetaction="hide">hide</button>
	  </body>
</html>
